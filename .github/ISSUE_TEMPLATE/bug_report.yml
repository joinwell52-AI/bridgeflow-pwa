name: "Bug Report / Bug 报告"
description: "Report a bug to help us improve / 报告一个 Bug"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting! Please fill in the details below.
        感谢反馈！请填写以下信息。

  - type: input
    id: version
    attributes:
      label: "CodeFlow Version / 版本号"
      placeholder: "e.g. 2.10.1"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "Component / 组件"
      options:
        - Desktop (EXE)
        - PWA (Mobile)
        - MCP Plugin
        - Relay Server
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description / 问题描述"
      placeholder: "What happened? / 发生了什么？"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce / 复现步骤"
      placeholder: |
        1. Open Desktop...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior / 期望行为"

  - type: input
    id: os
    attributes:
      label: "OS / 操作系统"
      placeholder: "e.g. Windows 11, macOS 15"

  - type: input
    id: cursor-version
    attributes:
      label: "Cursor Version / Cursor 版本"
      placeholder: "e.g. 0.50.x"
